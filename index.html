<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Math Skeleton Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root{--bg:#0a0c10;--pn:#0d0f14;--cd:#11131a;--bd:#1a1d2e;--bl:#252940;--ac:#7c83fd;--ab:rgba(124,131,253,.09);--tx:#d8dce8;--td:#7a7f9a;--tb:#f0f2ff;--fc:#4fc3f7;--op:#ffd54f;--st:#ef5350;--ok:#66bb6a;--wn:#ffa726}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Pretendard',-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
.sb{width:300px;min-width:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-hd{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}.sb-hd .lb{font-size:11px;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:2px}.sb-hd .tt{font-size:20px;font-weight:800;color:var(--tb)}.sb-hd .mt{font-size:12px;color:var(--td);margin-top:4px}
.vw-bar{display:flex;gap:0;padding:5px 8px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.vw-btn{padding:5px 9px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:11px;color:var(--td);border-radius:4px;white-space:nowrap}.vw-btn:hover{color:var(--tx)}.vw-btn.on{background:var(--ab);color:var(--ac);font-weight:700}
.sb-sr{padding:5px 8px;flex-shrink:0}.sb-sr input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.sb-ls{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 6px;position:relative;user-select:none}
.flt-panel{border-bottom:1px solid var(--bd);flex-shrink:0;padding:6px 8px}
.flt-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap}.flt-row:last-child{margin-bottom:0}
.flt-label{font-size:10px;color:var(--td);font-weight:700;min-width:30px;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.flt-chips{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
.flt-chip{font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;border:1px solid var(--bd);background:var(--pn);color:var(--td);white-space:nowrap;transition:all .1s}.flt-chip:hover{border-color:var(--ac);color:var(--tx)}.flt-chip.on{background:var(--ab);border-color:var(--ac);color:var(--ac);font-weight:700}
.flt-active{display:flex;gap:4px;flex-wrap:wrap;padding:4px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.flt-atag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--ac);color:#fff;display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-weight:600}.flt-atag:hover{opacity:.8}
.flt-clear{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bl);color:var(--td);cursor:pointer;font-weight:600}.flt-clear:hover{color:var(--tx)}
.flt-toggle{font-size:11px;color:var(--td);cursor:pointer;padding:2px 6px;display:flex;align-items:center;gap:4px;flex-shrink:0}.flt-toggle:hover{color:var(--ac)}
.flt-count{font-size:10px;color:var(--td)}
.lasso{position:absolute;border:1.5px solid rgba(124,131,253,.7);background:rgba(124,131,253,.1);pointer-events:none;z-index:10;border-radius:2px;box-shadow:0 0 8px rgba(124,131,253,.15)}
/* Bulk bar: fixed at sidebar bottom */
.bulk{padding:8px 10px;background:linear-gradient(180deg,rgba(124,131,253,.95),rgba(100,106,220,.95));font-size:11px;color:#fff;font-weight:700;flex-shrink:0;border-top:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px)}
.bulk button{padding:4px 8px;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.2);color:#fff;white-space:nowrap;flex-shrink:0}.bulk button:hover{background:rgba(255,255,255,.35)}
.bulk select{padding:3px 6px;border:none;border-radius:4px;font-size:10px;background:rgba(255,255,255,.2);color:#fff;font-family:inherit;flex-shrink:0;min-width:0;max-width:90px}
.bulk-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;min-width:0;flex-wrap:wrap}.bulk-row:last-child{margin-bottom:0}
.bulk-input{padding:3px 6px;border:none;border-radius:3px;font-size:10px;background:rgba(255,255,255,.18);color:#fff;font-family:inherit;outline:none;flex:1;min-width:30px}.bulk-input::placeholder{color:rgba(255,255,255,.5)}
.bulk-label{font-size:10px;flex-shrink:0;opacity:.85}
.bulk-count{font-size:12px;font-weight:800;margin-right:4px}
.pi.cut-mark{opacity:.4;border-left-color:var(--wn)!important}
.fl{font-size:13px;font-weight:700;color:var(--td);padding:7px 8px 3px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:5px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fl:hover{color:var(--ac)}.fl-drop{background:var(--ab);outline:1.5px dashed var(--ac);outline-offset:-2px}
.fl-rename,.pi-rename{background:var(--pn);border:1px solid var(--ac);border-radius:4px;padding:2px 6px;color:var(--tx);font-size:13px;font-weight:600;font-family:inherit;outline:none;min-width:0}
.fl-rename{font-weight:700;width:120px}.pi-rename{flex:1}
.pi{padding:5px 10px 5px 16px;border-radius:5px;cursor:default;margin-bottom:1px;border-left:3px solid transparent;transition:background .08s;font-size:13px;display:flex;align-items:center;gap:7px;overflow:hidden}
.pi:hover{background:var(--ab)}.pi.on{background:var(--ab);border-left-color:var(--ac)}.pi.sel-m{background:rgba(124,131,253,.18);border-left-color:rgba(124,131,253,.5)}.pi.dragging{opacity:.35;transform:scale(.97)}
.pi[draggable=true]:active{cursor:grabbing}
.pi .cb{width:13px;height:13px;accent-color:var(--ac);cursor:pointer;flex-shrink:0;opacity:0;transition:opacity .1s}
.pi:hover .cb,.pi.sel-m .cb,.pi.on .cb{opacity:1}
.pi .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default}.pi.on .nm{font-weight:700;color:var(--ac)}.pi .inf{font-size:10px;color:var(--td);flex-shrink:0}
.mn{flex:1;display:flex;flex-direction:column;min-width:0}
.tb-bar{display:flex;border-bottom:1px solid var(--bd);background:var(--pn);padding:0 12px;overflow-x:auto;flex-shrink:0}
.tb{padding:10px 12px;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:13px;color:var(--td);border-bottom:2px solid transparent;white-space:nowrap}.tb:hover{color:var(--tx)}.tb.on{color:var(--ac);font-weight:700;border-bottom-color:var(--ac)}
.ct{flex:1;overflow:auto;padding:18px 22px;min-width:0}
.cd{background:var(--cd);border-radius:8px;padding:16px;border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.sl{font-size:12px;font-weight:700;color:var(--td);letter-spacing:2px;margin-bottom:7px;text-transform:uppercase}
.bg{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}.badge{font-size:11px;padding:3px 7px;border-radius:4px}
.b-u{background:var(--ab);color:var(--ac)}.b-d{background:rgba(255,167,38,.1);color:var(--wn)}.b-a{background:rgba(102,187,106,.1);color:var(--ok)}.b-e{background:rgba(79,195,247,.1);color:var(--fc)}.b-v{background:rgba(124,131,253,.1);color:var(--ac)}.b-t{background:rgba(124,131,253,.06);color:var(--td)}
.er{padding:7px 11px;border-radius:5px;background:var(--cd);margin-bottom:3px;overflow:hidden}.er.side{opacity:.6;background:rgba(26,29,46,.5)}
.eh{display:flex;align-items:center;gap:6px;font-size:13px;flex-wrap:wrap}
.en{font-size:13px;color:var(--tx);margin-top:3px;padding-left:26px;line-height:1.6;overflow-wrap:break-word;word-break:break-word}
.es{font-size:10px;color:var(--wn);border:1px solid rgba(255,167,38,.3);border-radius:4px;padding:2px 6px}
.tw{position:relative;display:inline}.tw .tp{display:none;position:fixed;background:#1e2235;border:1px solid var(--bl);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--tx);white-space:normal;width:max-content;max-width:420px;z-index:999;line-height:1.5;box-shadow:0 4px 14px rgba(0,0,0,.6);pointer-events:none}.tw:hover .tp{display:block}
.ng{margin-bottom:14px}.ngl{font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.nr{display:flex;gap:10px;padding:6px 11px;background:var(--cd);border-radius:5px;border:1px solid var(--bd);margin-bottom:3px;align-items:flex-start;overflow:hidden}
.ni{font-size:13px;font-weight:700;min-width:50px;flex-shrink:0}.ns{font-size:13px;flex:1;min-width:0;overflow-wrap:break-word}.nc{font-size:10px;color:var(--td);background:var(--bd);border-radius:4px;padding:2px 6px;flex-shrink:0}
.dag{overflow:auto;max-height:500px;background:var(--bg);border-radius:8px;border:1px solid var(--bd)}
.hc{background:var(--cd);border-radius:8px;padding:12px;border:1px solid var(--bd);margin-bottom:8px}
.ht{font-size:11px;color:var(--ac);cursor:pointer;background:var(--ab);border:1px solid rgba(124,131,253,.2);border-radius:4px;padding:3px 7px}
.mg-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}.mg-label{font-size:13px;color:var(--td);min-width:80px}
.mg-input{flex:1;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;min-width:0}
.mg-tag{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--ab);color:var(--ac);display:inline-flex;align-items:center;gap:4px}
.mg-tag-x{cursor:pointer;font-weight:700;opacity:.6}.mg-tag-x:hover{opacity:1}
.mg-btn{padding:7px 14px;border:none;border-radius:5px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.mg-btn-p{background:var(--ac);color:#fff}.mg-btn-s{background:var(--bl);color:var(--tx)}.mg-btn-d{background:#3a1515;color:var(--st)}.mg-btn:disabled{opacity:.4;cursor:not-allowed}
.reg-input{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;resize:vertical;min-height:80px}
.reg-token{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px}
.reg-status{font-size:12px;padding:7px 10px;border-radius:5px;margin-top:7px}.reg-ok{background:rgba(102,187,106,.1);color:var(--ok);border:1px solid rgba(102,187,106,.2)}.reg-err{background:rgba(239,83,80,.1);color:var(--st);border:1px solid rgba(239,83,80,.2)}
.nlib-search{width:100%;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;margin-bottom:8px}
.empty{color:var(--td);font-size:14px;text-align:center;margin-top:60px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
.drag-ghost{position:fixed;pointer-events:none;z-index:1000;background:var(--cd);border:1px solid var(--ac);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--ac);font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.5);opacity:.92}
.ctx-menu{position:fixed;z-index:2000;background:#1a1e2e;border:1px solid var(--bl);border-radius:6px;padding:4px 0;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.6);font-size:13px}
.ctx-item{padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--tx)}.ctx-item:hover{background:var(--ab)}.ctx-item.disabled{opacity:.35;pointer-events:none}
.ctx-key{margin-left:auto;font-size:10px;color:var(--td);font-weight:600}.ctx-sep{height:1px;background:var(--bd);margin:4px 0}
.katex-display{overflow-x:auto;overflow-y:hidden}.katex{white-space:normal}
</style>
</head>
<body>
<div class="sb"><div class="sb-hd"><div class="lb">Skeleton</div><div class="tt">Viewer</div><div class="mt" id="meta">loading...</div></div><div class="vw-bar" id="vwbar"></div><div class="sb-sr"><input id="sq" placeholder="search..." oninput="rList()"></div><div id="fltpanel"></div><div id="fltactive"></div><div class="sb-ls" id="slist"></div><div id="bulkbar"></div></div>
<div class="mn"><div class="tb-bar" id="tbar"></div><div class="ct" id="ct"><div class="empty">select a problem</div></div></div>
<div class="ctx-menu" id="ctxmenu" style="display:none"></div>
<script>
var OW='koms7429-maker',RP='math-hub',BR='main',TABS=['problem','DAG','Skeleton','Solution','neurons','all neurons','history','manage','register'],VW=['All','Source','Theme','Difficulty','Folder'];
var probs=[],nMap={},nAll=[],sel=null,curT=0,curV=0,exH={},nlQ='',ghTk='',bsSha='';
var multiSel=new Set(),collapsed={},dragPid=null,dragFolder=null;
var folderParent={};try{var _fp=localStorage.getItem('folderParent');if(_fp)folderParent=JSON.parse(_fp)}catch(e){}
function saveFP(){localStorage.setItem('folderParent',JSON.stringify(folderParent))}
var flt={src:new Set(),thm:new Set(),dif:new Set(),fld:new Set()},fltOpen=true;
var clipboard={pids:[],mode:null},currentFolder=null,renaming=null,lassoActive=false,lassoStart=null,lassoEl=null;

function d64(b){return new TextDecoder('utf-8').decode(Uint8Array.from(atob(b.replace(/\s/g,'')),function(c){return c.charCodeAt(0)}))}
function rm(t){if(!t)return'';return String(t).split(/(\$[^$]+\$)/g).map(function(p){if(p.startsWith('$')&&p.endsWith('$')){try{return katex.renderToString(p.slice(1,-1),{throwOnError:false})}catch(e){return'<code>'+p.slice(1,-1)+'</code>'}}return p.replace(/</g,'&lt;').replace(/>/g,'&gt;')}).join('')}
function nc(id){if(!id)return'var(--td)';if(id.startsWith('\uc0ac\uc2e4'))return'var(--fc)';if(id.startsWith('\uc5f0\uc0b0'))return'var(--op)';if(id.startsWith('\uc804\ub7b5'))return'var(--st)';return'var(--td)'}
function bi(to){return to?to.replace(/_\d+$/,''):''}
function nTy(id){if(id.startsWith('\uc0ac\uc2e4'))return'fact';if(id.startsWith('\uc5f0\uc0b0'))return'op';if(id.startsWith('\uc804\ub7b5'))return'strat';return''}
function pNL(l){var m=l.match(/^\|\s*((?:\uc0ac\uc2e4|\uc5f0\uc0b0|\uc804\ub7b5)\d+)\s*\|\s*(.*)\s*$/);if(m){var s=m[2].replace(/\|\s*$/,'').trim();if(s)return{id:m[1],statement:s}}return null}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function tg(p){return{source:(p.metadata&&p.metadata.source)||(p.tags&&p.tags.source)||'',theme:(p.metadata&&p.metadata.unit)||(p.tags&&p.tags.theme)||'',difficulty:(p.metadata&&p.metadata.difficulty)||(p.tags&&p.tags.difficulty)||'',custom:(p.tags&&p.tags.custom)||[]}}
function splitField(v){if(!v)return[];return v.split(/[,;，]/).map(function(s){return s.trim()}).filter(Boolean)}
function allVals(dim){var s=new Set();probs.forEach(function(p){var t=tg(p);if(dim==='src')splitField(t.source).forEach(function(v){s.add(v)});else if(dim==='thm')splitField(t.theme).forEach(function(v){s.add(v)});else if(dim==='dif')splitField(t.difficulty).forEach(function(v){s.add(v)});else if(dim==='fld')(t.custom||[]).forEach(function(v){s.add(v)})});return[...s].sort()}
function allFolders(){return allVals('fld')}

function applyFilter(list){return list.filter(function(p){var t=tg(p);
  if(flt.src.size){var pv=splitField(t.source);if(!pv.some(function(v){return flt.src.has(v)}))return false}
  if(flt.thm.size){var pv=splitField(t.theme);if(!pv.some(function(v){return flt.thm.has(v)}))return false}
  if(flt.dif.size){var pv=splitField(t.difficulty);if(!pv.some(function(v){return flt.dif.has(v)}))return false}
  if(flt.fld.size){var pv=t.custom||[];if(!pv.some(function(v){return flt.fld.has(v)}))return false}
  return true})}
function hasAF(){return flt.src.size||flt.thm.size||flt.dif.size||flt.fld.size}
function toggleFlt(dim,val){if(flt[dim].has(val))flt[dim].delete(val);else flt[dim].add(val);rFilter();rList()}
function clearFlt(){flt={src:new Set(),thm:new Set(),dif:new Set(),fld:new Set()};rFilter();rList()}
function removeFlt(dim,val){flt[dim].delete(val);rFilter();rList()}

function rFilter(){
  var panel=document.getElementById('fltpanel'),active=document.getElementById('fltactive');
  if(hasAF()){var ah='<div class="flt-active">';
    [['src','Src'],['thm','Thm'],['dif','Dif'],['fld','Fld']].forEach(function(d){flt[d[0]].forEach(function(v){ah+='<span class="flt-atag" onclick="removeFlt(\''+d[0]+'\',\''+esc(v)+'\')">'+d[1]+':'+v+' \u2715</span>'})});
    ah+='<span class="flt-clear" onclick="clearFlt()">Clear</span></div>';active.innerHTML=ah}else active.innerHTML='';
  if(!fltOpen){panel.innerHTML='<div class="flt-panel"><span class="flt-toggle" onclick="fltOpen=true;rFilter()">&#9654; Filter</span></div>';return}
  var dims=[{key:'src',label:'SRC',vals:allVals('src')},{key:'thm',label:'THM',vals:allVals('thm')},{key:'dif',label:'DIF',vals:allVals('dif')},{key:'fld',label:'FLD',vals:allVals('fld')}];
  var h='<div class="flt-panel"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span class="flt-toggle" onclick="fltOpen=false;rFilter()">&#9660; Filter</span>';
  if(hasAF())h+='<span class="flt-count">'+applyFilter(probs).length+'/'+probs.length+'</span>';
  h+='</div>';
  dims.forEach(function(d){if(!d.vals.length)return;h+='<div class="flt-row"><span class="flt-label">'+d.label+'</span><div class="flt-chips">';d.vals.forEach(function(v){h+='<span class="flt-chip'+(flt[d.key].has(v)?' on':'')+'" onclick="toggleFlt(\''+d.key+'\',\''+esc(v)+'\')">'+v+'</span>'});h+='</div></div>'});
  h+='</div>';panel.innerHTML=h}

document.addEventListener('mousemove',function(ev){document.querySelectorAll('.tw:hover .tp').forEach(function(t){var x=ev.clientX+10,y=ev.clientY-8;if(x+420>window.innerWidth)x=ev.clientX-420;if(y<8)y=ev.clientY+18;if(y+180>window.innerHeight)y=ev.clientY-180;t.style.left=x+'px';t.style.top=y+'px'})});

async function load(){
  ghTk=localStorage.getItem('gh_token')||'';
  var api=function(u){return'https://api.github.com/repos/'+OW+'/'+RP+'/contents/'+u+'?ref='+BR};
  var hd=ghTk?{headers:{'Authorization':'token '+ghTk}}:{};
  try{var r=await Promise.all([fetch(api('bookshelf.json'),hd),fetch(api('neuron-list.md'),hd)]);
    if(r[0].ok){var j=await r[0].json();probs=JSON.parse(d64(j.content));bsSha=j.sha}
    else if(r[0].status===401||r[0].status===403||r[0].status===404){document.getElementById('meta').textContent='Token required (private repo)';return}
    if(r[1].ok){var j2=await r[1].json();var t=d64(j2.content);t.split('\n').forEach(function(l){var n=pNL(l);if(n){nMap[n.id]={id:n.id,statement:n.statement};nAll.push({id:n.id,statement:n.statement,type:nTy(n.id)})}})}}catch(e){console.error(e)}
  document.getElementById('meta').textContent=probs.length+' problems / '+nAll.length+' neurons';
  rVW();rFilter();rList();rTabs();if(probs.length>0){sel=probs[0];rList();rTabs();rCon()}}

function rVW(){document.getElementById('vwbar').innerHTML=VW.map(function(v,i){return'<button class="vw-btn '+(curV===i?'on':'')+'" onclick="curV='+i+';rList()">'+v+'</button>'}).join('')}

function getFolderChildren(parent){return allFolders().filter(function(f){return(folderParent[f]||null)===(parent||null)})}
function isDescendant(c,a){var cur=c,i=0;while(folderParent[cur]&&i<20){if(folderParent[cur]===a)return true;cur=folderParent[cur];i++}return false}
function renderFolderTree(groups,pf,depth){
  var html='',children=getFolderChildren(pf),gk=Object.keys(groups);
  var rel=children.filter(function(f){return gk.indexOf(f)>=0||getFolderChildren(f).length>0});
  if(!pf){gk.forEach(function(k){if(!folderParent[k]&&rel.indexOf(k)<0)rel.push(k)});rel.sort()}
  rel.forEach(function(k){var key=curV+'_'+k,col=collapsed[key],ind=depth*18;

(function(){
  var DEADZONE=6,pending=false,pendingEv=null;
  document.addEventListener('mousedown',function(ev){
    var slist=document.getElementById('slist');if(!slist||!slist.contains(ev.target))return;
    if(ev.target.closest('.cb')||ev.target.closest('input')||ev.target.closest('.fl'))return;
    if(ev.button!==0)return;
    /* If clicking on an already-selected item, let native drag handle it */
    var pi=ev.target.closest('.pi[data-pid]');
    if(pi){var pid=pi.getAttribute('data-pid');
      if(multiSel.has(pid)||(sel&&sel.problem_id===pid))return;
    }
    /* Start pending lasso (will activate after deadzone) */
    pending=true;pendingEv=ev;
    lassoStart={x:ev.clientX,y:ev.clientY,scrollTop:slist.scrollTop};
    if(!ev.ctrlKey&&!ev.metaKey&&!ev.shiftKey&&!pi)multiSel.clear();
  });
  document.addEventListener('mousemove',function(ev){
    if(!pending&&!lassoActive)return;
    var slist=document.getElementById('slist');if(!slist)return;
    /* Check deadzone before activating lasso */
    if(pending&&!lassoActive){
      var dx=ev.clientX-lassoStart.x,dy=ev.clientY-lassoStart.y;
      if(Math.abs(dx)<DEADZONE&&Math.abs(dy)<DEADZONE)return;
      /* Activate lasso */
      lassoActive=true;pending=false;
      /* Cancel any native drag that might have started */
      if(pendingEv){var pi=pendingEv.target.closest('.pi');if(pi)pi.setAttribute('draggable','false')}
      lassoEl=document.createElement('div');lassoEl.className='lasso';slist.appendChild(lassoEl);
      if(!pendingEv.ctrlKey&&!pendingEv.metaKey&&!pendingEv.shiftKey)multiSel.clear();
      pendingEv=null;
    }
    if(!lassoActive||!lassoEl||!lassoStart)return;
    var rect=slist.getBoundingClientRect(),sd=slist.scrollTop-lassoStart.scrollTop;
    var sx=lassoStart.x-rect.left,sy=lassoStart.y-rect.top+sd;
    var cx=ev.clientX-rect.left,cy=ev.clientY-rect.top;
    lassoEl.style.left=Math.max(0,Math.min(sx,cx))+'px';lassoEl.style.top=Math.min(sy,cy)+'px';
    lassoEl.style.width=Math.abs(cx-sx)+'px';lassoEl.style.height=Math.abs(cy-sy)+'px';
    /* Auto-scroll when near edges */
    if(ev.clientY-rect.top<20)slist.scrollTop-=8;
    if(rect.bottom-ev.clientY<20)slist.scrollTop+=8;
    var lr={left:Math.min(lassoStart.x,ev.clientX),top:Math.min(lassoStart.y,ev.clientY),right:Math.max(lassoStart.x,ev.clientX),bottom:Math.max(lassoStart.y,ev.clientY)};
    slist.querySelectorAll('.pi[data-pid]').forEach(function(el){
      var ir=el.getBoundingClientRect();if(ir.bottom>lr.top&&ir.top<lr.bottom&&ir.right>lr.left&&ir.left<lr.right){multiSel.add(el.getAttribute('data-pid'));el.classList.add('sel-m')}});
  });
  document.addEventListener('mouseup',function(ev){
    if(pending&&!lassoActive){
      /* Was a click, not a drag — handle as normal click */
      pending=false;pendingEv=null;lassoStart=null;return;
    }
    if(!lassoActive){pending=false;return}
    lassoActive=false;pending=false;
    if(lassoEl&&lassoEl.parentNode)lassoEl.parentNode.removeChild(lassoEl);
    lassoEl=null;lassoStart=null;pendingEv=null;
    /* Re-enable draggable on all items */
    document.querySelectorAll('.pi[data-pid]').forEach(function(el){el.setAttribute('draggable','true')});
    rList()})
})();

function rDAG(p){var sk=p.skeleton;if(!sk||!sk.length)return'<div class="empty">no skeleton</div>';var nodes=new Set,edges=[],cIds=new Set;if(p.clues)for(var i=0;i<p.clues.length;i++){cIds.add(p.clues[i].id);nodes.add(p.clues[i].id)}for(var i=0;i<sk.length;i++){var e=sk[i];var fs=Array.isArray(e.from)?e.from:[e.from];for(var j=0;j<fs.length;j++){if(fs[j])nodes.add(fs[j])}if(e.to)nodes.add(e.to);for(var j=0;j<fs.length;j++){if(fs[j]&&e.to)edges.push({f:fs[j],t:e.to,m:e.main!==false})}}

function rHi(p){if(!p.history||!p.history.length)return'<div class="empty">no history</div>';var h='<div class="sl">'+p.history.length+' versions</div>';[...p.history].reverse().forEach(function(v,ri){var oi=p.history.length-1-ri;var vn=oi+1;var ex=exH[oi];h+='<div class="hc"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700;color:var(--td)">v'+vn+' <span style="font-size:11px;font-weight:400">e:'+(v.skeleton||[]).length+'</span></span><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--td)">'+(v.created_at?new Date(v.created_at).toLocaleString('ko-KR'):'')+'</span><span class="ht" onclick="exH['+oi+']=!exH['+oi+'];rCon()">'+(ex?'hide':'show')+'</span></div></div>';if(ex&&v.skeleton){h+='<div style="margin-top:6px;max-height:260px;overflow-y:auto">';v.skeleton.forEach(function(e,j){var fs=Array.isArray(e.from)?e.from:[e.from];var c=nc(bi(e.to));var iS=e.main===false;h+='<div class="er'+(iS?' side':'')+'" style="border-left:2px solid '+c+';padding:3px 8px"><span style="font-size:10px;color:var(--td)">#'+(j+1)+' '+fs.join('+')+' -> </span><span style="font-size:11px;color:'+c+';font-weight:700">'+e.to+'</span>'+(e.note?'<div style="font-size:11px;padding-left:16px">'+rm(e.note)+'</div>':'')+'</div>'});h+='</div>'}h+='</div>'});return h}
